services:

  scheduler:
    build: .
    command: >
      sh -c "python -m scheduler.jobs --init &&
             python -m scheduler.jobs"
    volumes:
      - ./data:/app/data
      - ./scheduler:/app/scheduler
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import duckdb; duckdb.connect('/app/data/stocks.db', read_only=True).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./api:/app/api
    depends_on:
      scheduler:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run ui/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    volumes:
      - ./ui:/app/ui
    depends_on:
      - api
    restart: unless-stopped
